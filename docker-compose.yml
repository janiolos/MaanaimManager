services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-eventa}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventa}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-eventa}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-eventa}_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-8000}
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS}
      TIMEZONE: ${TIMEZONE:-America/Sao_Paulo}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_DEBUG: 0
    expose:
      - "${APP_PORT:-8000}"
    volumes:
      - ./media:/app/media:z
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Usando curl e aceitando status 200 ou 302/301
      test: [ "CMD-SHELL", "curl -f http://localhost:${APP_PORT:-8000}/login/ || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: ${PROJECT_NAME:-eventa}_caddy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - static_data:/srv/static:ro
      - ./media:/srv/media:ro,z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    name: ${PROJECT_NAME:-eventa}_network

volumes:
  static_data:
    name: ${PROJECT_NAME:-eventa}_static
  caddy_data:
    name: ${PROJECT_NAME:-eventa}_caddy_data
  caddy_config:
    name: ${PROJECT_NAME:-eventa}_caddy_config
