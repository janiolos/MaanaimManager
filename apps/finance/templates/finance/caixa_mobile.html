{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gestão de Caixa PWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            /* Cores padrão do MaanaimManager */
            --bg-color: #ffffff;
            --card-bg: #f6f8fb;
            --accent-color: #1f2937;  /* Preto Fosco / Ink */
            --success-color: #2e7d32; /* Verde Sucesso */
            --danger-color: #c0392b;  /* Vermelho Alerta */
            --text-main: #1f2937;
            --text-dim: #64748b;
            --input-bg: #ffffff;
            --border-color: #dbe3ed;
        }

        body {
            font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', system-ui, sans-serif;
            background-color: #e1e5ea; 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading overlay (como no PDV Mobile) */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-size: 1.1rem; font-weight: bold; color: var(--accent-color); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--bg-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            border: none;
            overflow: hidden;
        }
        
        @media(min-width: 480px) {
            .app-container {
                height: 850px;
                border-radius: 40px;
                border: 8px solid #c8d6e5; 
            }
        }

        header.pwa-header {
            background-color: var(--accent-color);
            color: white;
            padding: calc(1rem + env(safe-area-inset-top)) 1rem 1rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard {
            background: linear-gradient(145deg, #ffffff, #f6f8fb);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--success-color);
        }

        .total-amount {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--success-color);
            margin: 5px 0;
        }

        .resumo-valores {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: calc(30px + env(safe-area-inset-bottom));
        }

        .section-label {
            color: var(--success-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .form-group { margin-bottom: 12px; }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            font-weight: 600;
        }

        select, input, textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            font-size: 16px; /* evita zoom agressivo no iOS */
            transition: border-color 0.2s;
        }
        
        select:focus, input:focus, textarea:focus {
            border-color: var(--success-color);
        }

        select { -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 1em; padding-right: 40px; }

        .input-with-button {
            display: flex;
            gap: 8px;
        }

        .btn-new {
            background: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-new:hover { background: #e8e9ed; }

        .signature-pad-container {
            background-color: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
            border: 2px solid var(--border-color);
        }

        #signature-pad { width: 100%; height: 100px; cursor: crosshair; touch-action: none; border-radius: 8px;}

        .sig-controls { 
            display: flex; 
            justify-content: flex-end; 
            padding: 5px; 
            background: var(--card-bg); 
            border-radius: 0 0 8px 8px;
            border-top: 1px solid var(--border-color);
        }

        .btn-clear-sig {
            background: var(--text-dim);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--success-color);
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
            -webkit-appearance: none;
        }
        
        .btn-submit:disabled {
            background-color: var(--text-dim);
            cursor: not-allowed;
        }

        .receipt-card {
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .card-receita { border-left: 4px solid var(--success-color); }
        .card-despesa { border-left: 4px solid var(--danger-color); }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .btn-action {
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-pdf { background: var(--text-dim); }

        .saved-signature {
            height: 25px;
            background: white;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .history-title {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Conectando ao núcleo financeiro...</p>
</div>

<div class="app-container" style="display:none;" id="app-content">
    <header class="pwa-header">
        <h2 style="font-size: 1.1rem; margin: 0;"><i class="fas fa-wallet"></i> Caixa Mobile</h2>
        <div style="text-align: right; font-size: 0.8rem;">
            <span id="nome-operador-header" style="font-weight:bold; display:block;"></span>
            <a href="/" style="color:white; text-decoration:underline;">Ir para Painel</a>
        </div>
    </header>

    <div class="content">
        <span class="section-label">Novo Lançamento</span>
        
        <div class="form-group">
            <label>Evento Destino</label>
            <select id="evento"></select>
        </div>

        <div class="form-group">
            <label>Tipo de Operação</label>
            <select id="tipo" onchange="alternarCampos()">
                <option value="Receita">🟢 Receita (Entrada)</option>
                <option value="Despesa">🔴 Despesa (Saída)</option>
            </select>
        </div>

        <div class="form-group" id="grupo-setor">
            <label id="label-categoria">Categoria Financeira da Receita</label>
            <select id="categoria"></select>
        </div>

        <div class="form-group" id="grupo-pessoa">
            <label id="label-pessoa">Pagador / Cliente (De quem?)</label>
            <input type="text" id="pessoa" placeholder="Nome da Pessoa/Empresa">
        </div>

        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" id="valor" step="0.01" inputmode="decimal" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Descrição Opcional</label>
            <textarea id="descricao" rows="1" placeholder="Ex: Venda de Ingressos"></textarea>
        </div>

        <label style="font-size: 0.7rem; color: var(--success-color); font-weight: bold;">Assinatura Eletrônica (Para Recibo):</label>
        <div class="signature-pad-container">
            <canvas id="signature-pad"></canvas>
            <div class="sig-controls">
                <button class="btn-clear-sig" onclick="clearSignature()">Limpar Traço</button>
            </div>
        </div>

        <button class="btn-submit" onclick="salvarLancamento()">Registrar no Caixa</button>

        <div class="history-title">
            <span class="section-label" style="margin-bottom: 0;">Meus Registros hoje</span>
        </div>
        
        <div id="lista-caixa"></div>
    </div>
</div>

<script>
    // Recupera token CSRF do Django para POST seguro
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    let eventos = [];
    let db = []; // Agora preenchido via fetch
    let categoriasDoBd = { 'Receita': [], 'Despesa': [] };

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function carregarDadosIniciais() {
        try {
            const resp = await fetch('/finance/caixa-app/api/dados/');
            if(!resp.ok) throw new Error("Erro na API.");
            const data = await resp.json();
            
            document.getElementById('nome-operador-header').innerText = data.operador;
            eventos = data.eventos;
            db = data.lancamentos;
            categoriasDoBd = data.categorias;

            const evSelect = document.getElementById('evento');
            evSelect.innerHTML = eventos.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');

            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('loading-overlay').style.display = 'none';

            alternarCampos(); // Populate initial categories
            atualizarUI();
            
            // Corrige dimensao do canvas apos a revelacao da tela
            setTimeout(resizeCanvas, 100);
            
        } catch (error) {
            document.getElementById('loading-text').innerText = "Erro ao conectar. Tente novamente.";
            console.error(error);
        }
    }

    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let canvasIsBlank = true;

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        preencherFundoBranco();
    }
    window.addEventListener('resize', resizeCanvas);

    function preencherFundoBranco() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        canvasIsBlank = true;
    }

    function startDrawing(e) { drawing = true; canvasIsBlank = false; draw(e); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);
        
        if (!clientX) return;
        
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
    window.addEventListener('touchend', stopDrawing);

    function clearSignature() { 
        preencherFundoBranco();
    }

    function alternarCampos() {
        const tipo = document.getElementById('tipo').value;
        const labelPessoa = document.getElementById('label-pessoa');
        const labelCategoria = document.getElementById('label-categoria');
        const selectCategoria = document.getElementById('categoria');
        
        // Popula as categorias
        selectCategoria.innerHTML = categoriasDoBd[tipo].map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        
        if (tipo === 'Receita') {
            document.getElementById('grupo-setor').style.display = 'block';
            labelPessoa.innerText = 'Pagador / Cliente (De quem?)';
            labelCategoria.innerText = 'Categoria (Fonte da Receita)';
        } else {
            document.getElementById('grupo-setor').style.display = 'block';
            labelPessoa.innerText = 'Favorecido (Para quem?)';
            labelCategoria.innerText = 'Categoria da Despesa';
        }
    }

    async function salvarLancamento() {
        const eventoId = document.getElementById('evento').value;
        if (!eventoId) return alert("Selecione um evento válido.");
        
        const tipo = document.getElementById('tipo').value;
        const valorStr = document.getElementById('valor').value.replace(',','.');
        const valor = parseFloat(valorStr);
        const descricao = document.getElementById('descricao').value;
        const pessoa = document.getElementById('pessoa').value;
        
        const categoriaId = document.getElementById('categoria').value;
        const selectCat = document.getElementById('categoria');
        const categoriaNome = selectCat.options[selectCat.selectedIndex].text;

        if (isNaN(valor) || valor <= 0) return alert("Digite um valor válido maior que zero!");

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerText = "Registrando...";

        const assinaturaBase64 = canvasIsBlank ? null : canvas.toDataURL("image/jpeg", 1.0); 

        const payload = {
            eventoId: eventoId,
            tipo: tipo,
            categoriaId: categoriaId,
            pessoa: pessoa,
            valor: valor,
            descricao: descricao,
            assinatura: assinaturaBase64
        };

        try {
            const resp = await fetch('/finance/caixa-app/api/salvar/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(payload)
            });

            if(!resp.ok) {
                const errData = await resp.json();
                throw new Error(errData.error || "Falha na transação.");
            }

            const resData = await resp.json();
            
            // Adicionar ao DB local e atualizar UI instantaneamente
            db.unshift({
                id: resData.lancamento_id,
                evento: document.getElementById('evento').options[document.getElementById('evento').selectedIndex].text,
                tipo: tipo,
                setor: categoriaNome,
                pessoa: pessoa || 'Não informado',
                valor: valor,
                descricao: descricao,
                assinatura: assinaturaBase64,
                data: new Date().toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})
            });
            
            document.getElementById('valor').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('pessoa').value = '';
            clearSignature();
            atualizarUI();
            
        } catch(e) {
            alert("Erro: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Registrar no Caixa";
        }
    }

    function atualizarUI() {
        const lista = document.getElementById('lista-caixa');
        lista.innerHTML = '';
        
        let totalReceitas = 0, totalDespesas = 0;

        db.forEach(item => {
            if(item.tipo === 'Receita') totalReceitas += parseFloat(item.valor);
            if(item.tipo === 'Despesa') totalDespesas += parseFloat(item.valor);

            const corValor = item.tipo === 'Receita' ? 'var(--success-color)' : 'var(--danger-color)';
            const classeCard = item.tipo === 'Receita' ? 'card-receita' : 'card-despesa';
            const sinal = item.tipo === 'Receita' ? '+' : '-';
            
            const tituloCard = item.tipo === 'Receita' ? `${item.setor} (${item.pessoa})` : item.pessoa;

            const card = document.createElement('div');
            card.className = `receipt-card ${classeCard}`;
            card.innerHTML = `
                <div class="card-header">
                    <strong style="color: var(--text-main); font-size: 0.9rem;">${tituloCard}</strong>
                    <span style="color: ${corValor}; font-weight: bold; font-size: 0.9rem;">${sinal} R$ ${parseFloat(item.valor).toFixed(2)}</span>
                </div>
                <p style="font-size: 0.7rem; color: var(--text-dim); margin: 0;">${item.evento} | ${item.data}</p>
                <p style="font-size: 0.75rem; color: var(--text-main); margin: 5px 0;">${item.descricao || 'Sem descrição'}</p>
                
                <div class="card-actions">
                    ${item.assinatura ? `<img src="${item.assinatura}" class="saved-signature" title="Assinatura">` : `<span style="font-size:0.6rem; color:var(--text-dim);">Sem assinatura</span>`}
                    <div>
                        <button class="btn-action btn-pdf" onclick="gerarPDF(${item.id})"><i class="fas fa-file-pdf"></i> Imprimir</button>
                    </div>
                </div>
            `;
            lista.appendChild(card);
        });
    }

    function gerarPDF(id) {
        const item = db.find(i => i.id === id);
        if(!item) return;
        
        const element = document.createElement('div');
        element.style.padding = '40px';
        element.style.fontFamily = 'Arial, sans-serif';
        element.style.color = '#000';
        element.style.backgroundColor = '#fff';
        
        let assinaturaHTML = '';
        if (item.assinatura) {
            assinaturaHTML = `<img src="${item.assinatura}" width="250" style="display: block; margin: 0 auto; border-bottom: 1px solid #000;">`;
        } else {
            assinaturaHTML = `<div style="height: 80px; width: 250px; border-bottom: 1px solid #000; margin: 0 auto;"></div>`;
        }

        element.innerHTML = `
            <div style="text-align: center; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px;">
                <h1 style="margin: 0; font-size: 24px;">Recibo de ${item.tipo}</h1>
                <p style="margin: 5px 0; color: #555; font-size: 18px;">Evento: <strong>${item.evento}</strong></p>
                <p style="margin: 5px 0; color: #777; font-size: 14px;"><strong>#ID:</strong> ${item.id}</p>
            </div>
            
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                <tr><td style="padding: 12px 0; border-bottom: 1px solid #ddd;"><strong>Data:</strong></td> <td style="text-align: right; padding: 12px 0; border-bottom: 1px solid #ddd;">${item.data}</td></tr>
                <tr><td style="padding: 12px 0; border-bottom: 1px solid #ddd;"><strong>Tipo:</strong></td> <td style="text-align: right; padding: 12px 0; border-bottom: 1px solid #ddd;">${item.tipo}</td></tr>
                ${item.tipo === 'Receita' ? `<tr><td style="padding: 12px 0; border-bottom: 1px solid #ddd;"><strong>Setor de Origem:</strong></td> <td style="text-align: right; padding: 12px 0; border-bottom: 1px solid #ddd;">${item.setor}</td></tr>` : ''}
                <tr><td style="padding: 12px 0; border-bottom: 1px solid #ddd;"><strong>${item.tipo === 'Receita' ? 'Pagador/Cliente' : 'Favorecido'}:</strong></td> <td style="text-align: right; padding: 12px 0; border-bottom: 1px solid #ddd;">${item.pessoa || 'Não informado'}</td></tr>
                <tr><td style="padding: 12px 0; border-bottom: 1px solid #ddd;"><strong>Descrição:</strong></td> <td style="text-align: right; padding: 12px 0; border-bottom: 1px solid #ddd;">${item.descricao || '-'}</td></tr>
                <tr><td style="padding: 20px 0; font-size: 20px;"><strong>Valor Original:</strong></td> <td style="text-align: right; padding: 20px 0; font-size: 20px;"><strong>R$ ${parseFloat(item.valor).toFixed(2)}</strong></td></tr>
            </table>

            <div style="margin-top: 60px; text-align: center;">
                ${assinaturaHTML}
                <div style="width: 250px; margin: 5px auto 0 auto; padding-top: 5px; font-size: 14px;">
                    Assinatura do Autorizado
                </div>
            </div>
        `;

        const nomeArquivo = `Recibo_${item.id}.pdf`;
        const opt = {
            margin:       10,
            filename:     nomeArquivo,
            image:        { type: 'jpeg', quality: 1.0 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a5', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }

    // Handlers
    carregarDadosIniciais();
</script>

</body>
</html>
